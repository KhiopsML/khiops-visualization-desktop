<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Khiops Visualization Desktop</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <style>
      .welcome-header {
        display: flex;
        align-items: center;
        flex-direction: column;
        margin-bottom: 40px;
        align-items: center;
        justify-content: center;

        span {
          font-size: 24px;
          font-weight: 700;
          color: #111;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="app-loading-screen"
      style="
        background: #ffffff;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.3s ease-out;
      "
    >
      <div class="welcome-header">
        <svg
          version="1.0"
          width="80"
          height="80"
          viewBox="0 0 496.31 305.509"
          xmlns="http://www.w3.org/2000/svg"
          style="will-change: opacity; filter: url(#gpu-accel)"
        >
          <defs>
            <filter id="gpu-accel" style="color-interpolation-filters: sRGB">
              <feGaussianBlur in="SourceGraphic" stdDeviation="0" />
            </filter>
          </defs>
          <style>
            @keyframes drawFill {
              0% {
                fill-opacity: 0;
              }
              18% {
                fill-opacity: 0;
              }
              28% {
                fill-opacity: 1;
              }
              70% {
                fill-opacity: 1;
              }
              88% {
                fill-opacity: 0;
              }
              100% {
                fill-opacity: 0;
              }
            }
            .shape {
              fill-opacity: 0;
              will-change: fill-opacity;
            }
            .s1 {
              animation: drawFill 1.8s ease-in-out 0s infinite;
            }
            .s2 {
              animation: drawFill 1.8s ease-in-out 0.02s infinite;
            }
            .s3 {
              animation: drawFill 1.8s ease-in-out 0.04s infinite;
            }
            .s4 {
              animation: drawFill 1.8s ease-in-out 0.08s infinite;
            }
            .s5 {
              animation: drawFill 1.8s ease-in-out 0.12s infinite;
            }
            .s6 {
              animation: drawFill 1.8s ease-in-out 0.16s infinite;
            }
            .s7 {
              animation: drawFill 1.8s ease-in-out 0.2s infinite;
            }
            .s8 {
              animation: drawFill 1.8s ease-in-out 0.24s infinite;
            }
          </style>

          <path
            class="shape s1"
            style="fill: #5f9ac7"
            d="m259.43 0 10.732 41.142-94.356 28.827z"
          />
          <path
            class="shape s2"
            style="fill: #2e5674"
            d="m259.43 0 10.732 41.142 39.138 9.382z"
          />
          <path
            class="shape s3"
            style="fill: #91cb47"
            d="m276.207 64.315 12.806 49.09-165.849 29.05z"
          />
          <path
            class="shape s4"
            style="fill: #527823"
            d="m276.207 64.315 12.806 49.09 78.288 11.98z"
          />
          <path
            class="shape s5"
            style="fill: #ffb448"
            d="m295.528 138.378 13.514 51.806-246.25 33.15z"
          />
          <path
            class="shape s6"
            style="fill: #996823"
            d="m295.528 138.378 13.514 51.806 119.647 21.577z"
          />
          <path
            class="shape s7"
            style="fill: #ed614e"
            d="m316.075 217.14 15.414 59.091-331.49 28.495z"
          />
          <path
            class="shape s8"
            style="fill: #8e3327"
            d="m316.075 217.14 15.414 59.091 164.82 29.278z"
          />
        </svg>
        <span>Khiops Visualization Desktop</span>
      </div>
    </div>
    <app-root></app-root>
    <script>
      // Ensure loading screen is visible for at least 1 second
      setTimeout(() => {
        const loadingScreen = document.getElementById('app-loading-screen');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.pointerEvents = 'none';
          setTimeout(() => {
            loadingScreen.style.display = 'none';
          }, 300); // Allow fade-out transition
        }
      }, 1000);
    </script>
  </body>
</html>
