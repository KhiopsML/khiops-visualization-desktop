<div class="tab-header">
  <div class="tabs-container">
    <div class="tab-list">
      <div
        *ngFor="let tab of tabs; trackBy: trackByTabId"
        class="tab"
        [class.active]="tab.isActive"
        [class.dirty]="tab.isDirty"
        (click)="onTabClick(tab)"
        (mouseup)="onTabMouseUp($event, tab)"
        (pointerdown)="onTabPointerDown($event, tab, tabEl)"
        #tabEl
        [title]="tab.title + (tab.filePath ? '\n' + tab.filePath : '')"
      >
        <div class="tab-icon">
          <img *ngIf="tab.componentType === 'visualization'" src="assets/icons/icon-visu.png" alt="Visualization" width="16" height="16" />
          <img *ngIf="tab.componentType === 'covisualization'" src="assets/icons/icon-covisu.png" alt="Covisualization" width="16" height="16" />
        </div>

        <span class="tab-title">{{ getDisplayTitle(tab) }}</span>

        <div *ngIf="tab.isLoading" class="tab-spinner">
          <div class="spinner"></div>
        </div>

        <div *ngIf="tab.isDirty && !tab.isLoading" class="tab-dirty">●</div>

        <button class="tab-close" (click)="onTabClose($event, tab)" [attr.aria-label]="'Close ' + tab.title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="new-tab-btn" (click)="onOpenFileClick()" aria-label="Open new tab" title="Open new tab">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
      </svg>
    </button>
  </div>
</div>
