<div class="app-container">
  <!-- Tab header -->
  <app-tab-header></app-tab-header>

  <!-- Main content area -->
  <div
    class="main-content"
    [class.drag-over]="isDragOver"
    (dragenter)="onDragEnter($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <!-- Welcome screen - shown when no tabs have files -->
    <app-welcome *ngIf="!activeTab || !activeTab.filePath"></app-welcome>

    <!-- Tab content containers -->
    <div class="tab-content-container">
      <!-- Big file loading component -->
      <app-big-file-loading></app-big-file-loading>

      <!-- One component per tab based on its type -->
      <div
        *ngFor="let tab of tabs; trackBy: trackByTabId"
        [style.display]="tab.isActive ? 'block' : 'none'"
        style="width: 100%; height: 100%"
      >
        <!-- Visualization component for this tab (always created) -->
        <khiops-visualization
          *ngIf="tab.componentType === 'visualization'"
          #khiopsComponent
          [attr.data-tab-id]="tab.id"
          style="visibility: visible !important; width: 100%; height: 100%"
        >
        </khiops-visualization>

        <!-- Covisualization component for this tab (always created) -->
        <khiops-covisualization
          *ngIf="tab.componentType === 'covisualization'"
          #khiopsComponent
          [attr.data-tab-id]="tab.id"
          style="visibility: visible !important; width: 100%; height: 100%"
        >
        </khiops-covisualization>
      </div>
    </div>
  </div>
</div>
