name: Build/release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  KEYPAIR_PROD: KP_Khiops_HSM
  KEYPAIR_TEST: KP_Khiops_Test

jobs:
  build:
    permissions: write-all
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Replace SSH with HTTPS in yarn.lock (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
            sed -i '' 's#git+ssh://git@github.com#https://github.com#g' yarn.lock
          else
            sed -i 's#git+ssh://git@github.com#https://github.com#g' yarn.lock
          fi
        continue-on-error: true

      - name: Replace SSH with HTTPS in yarn.lock (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-Content yarn.lock) -replace 'git\+ssh://git@github.com', 'https://github.com' | Set-Content yarn.lock
        continue-on-error: true

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 22
        continue-on-error: true

      - run: yarn setEnv
        env:
          TRACKER_ID: ${{ secrets.TRACKER_ID }}
        continue-on-error: true

      - name: Prepare for app notarization (macOS)
        if: startsWith(matrix.os, 'macos')
        # Import Apple API key for app notarization on macOS
        run: |
          mkdir -p ~/private_keys/
          echo '${{ secrets.api_key }}' > ~/private_keys/AuthKey_${{ secrets.api_key_id }}.p8
        continue-on-error: true

      - name: Add node-gyp resolution for CI (Node.js)
        run: |
          node -e "let p=require('./package.json');p.resolutions=p.resolutions||{};p.resolutions['node-gyp']='https://github.com/electron/node-gyp.git';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: Force Install Dependencies Before Build
        run: yarn install --force
        continue-on-error: true

      # Configuration of SAAS signature for Windows only
      - name: Validate secrets (Windows only)
        if: runner.os == 'Windows'
        run: |
          # Verify that all required secrets are present
          if [[ -z "${{ secrets.SM_HOST }}" ]]; then
            echo "❌ SM_HOST secret is missing"
            exit 1
          fi
          if [[ -z "${{ secrets.SM_API_KEY }}" ]]; then
            echo "❌ SM_API_KEY secret is missing"
            exit 1
          fi
          if [[ -z "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" ]]; then
            echo "❌ SM_CLIENT_CERT_FILE_B64 secret is missing"
            exit 1
          fi
          if [[ -z "${{ secrets.SM_CLIENT_CERT_PASSWORD }}" ]]; then
            echo "❌ SM_CLIENT_CERT_PASSWORD secret is missing"
            exit 1
          fi
          echo "✅ All required secrets are present"
        shell: bash
        continue-on-error: true

      - name: Setup SM_CLIENT_CERT_FILE from base64 secret data (Windows only)
        if: runner.os == 'Windows'
        run: |
          echo "SM_CLIENT_CERT_FILE=D:\\Certificate_pkcs12.p12" >> "$GITHUB_ENV"
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > /d/Certificate_pkcs12.p12
          if [[ ! -f "/d/Certificate_pkcs12.p12" ]]; then
            echo "❌ Failed to create certificate file"
            exit 1
          fi
          echo "✅ Certificate file created successfully"
        shell: bash
        continue-on-error: true

      - name: Build/release Electron
        uses: samuelmeuli/action-electron-builder@v1.6.0
        with:
          build_script_name: 'build:prod'
          github_token: ${{ secrets.github_token }}

          # All platforms use --publish never so we control uploads ourselves
          release: false
          args: >-
            ${{ matrix.arch == 'arm64' && '--publish never --arm64 --linux' || '--publish never' }}

          mac_certs: ${{ secrets.mac_certs }}
          mac_certs_password: ${{ secrets.mac_certs_password }}
        env:
          DEBUG: electron-builder
          # macOS notarization API key
          API_KEY_ID: ${{ secrets.api_key_id }}
          API_KEY_ISSUER_ID: ${{ secrets.api_key_issuer_id }}
        continue-on-error: true

      # Signing Windows executables after the build
      - name: Setup Software Trust Manager and sign Windows executables
        if: runner.os == 'Windows'
        uses: digicert/code-signing-software-trust-action@v1.0.1
        with:
          input: release/
          keypair-alias: KP_Khiops_HSM
          simple-signing-mode: true
        env:
          SM_HOST: ${{ secrets.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
        continue-on-error: true

      # List all .exe files
      - name: List all .exe files
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Output "📂 Listing all .exe files in release directory..."
          Get-ChildItem -Path release -Filter *.exe | ForEach-Object { Write-Output $_.FullName; Write-Output $_.Length }
          Write-Output "✅ Listed all .exe files."
        continue-on-error: true

      # Replace spaces with hyphens in all artifact filenames (AppImage, macOS dmg/zip, Windows exe)
      - name: Rename artifacts (replace spaces with hyphens)
        run: |
          cd release
          for f in *; do
            if [[ "$f" == *" "* ]] && [ -f "$f" ]; then
              newname=$(echo "$f" | tr ' ' '-')
              mv -- "$f" "$newname"
              echo "✅ Renamed '$f' → '$newname'"
            fi
          done
        shell: bash
        continue-on-error: true

      # Capitalize lowercase Linux artifacts (zip, deb, rpm)
      - name: Rename Linux artifacts to capitalized convention
        if: runner.os == 'Linux'
        run: |
          for f in release/khiops-visualization-desktop[-_]*; do
            if [ -f "$f" ]; then
              newname=$(echo "$f" | sed 's|release/khiops-visualization-desktop|release/Khiops-Visualization-Desktop|')
              mv "$f" "$newname"
              echo "✅ Renamed $f → $newname"
            fi
          done
        continue-on-error: true

      # Update all latest*.yml files with correct (hyphenated, capitalized) filenames
      - name: Update latest yml files with correct filenames
        run: |
          for yml in release/latest*.yml; do
            if [ -f "$yml" ]; then
              sed 's/Khiops Visualization Desktop/Khiops-Visualization-Desktop/g; s/khiops-visualization-desktop/Khiops-Visualization-Desktop/g' "$yml" > "${yml}.tmp" && mv "${yml}.tmp" "$yml"
              echo "✅ Updated $yml"
            fi
          done
        shell: bash
        continue-on-error: true

      # Update latest.yml sha, size, path, and url for the signed Windows exe
      - name: Update latest.yml for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Filter "Khiops-Visualization-Desktop-Setup-*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No signed executable found in release directory."
            exit 1
          }
          $hash = Get-FileHash -Algorithm SHA512 -Path $exe.FullName
          $hex = $hash.Hash
          $bytes = for ($i = 0; $i -lt $hex.Length; $i += 2) { [Convert]::ToByte($hex.Substring($i, 2), 16) }
          $base64 = [Convert]::ToBase64String($bytes)
          $size = (Get-Item $exe.FullName).Length
          $latestYml = "release/latest.yml"
          if (-not (Test-Path $latestYml)) {
            Write-Error "latest.yml not found."
            exit 1
          }
          $content = Get-Content $latestYml
          $content = $content -replace "sha512:\s*.+", "sha512: $base64"
          $content = $content -replace "size:\s*.+", "size: $size"
          $content = $content -replace "url:\s*.+", "url: $($exe.Name)"
          $content = $content -replace "path:\s*.+", "path: $($exe.Name)"
          $content | Set-Content $latestYml
          Write-Output "✅ Updated latest.yml (sha512, size, path, url) for: $($exe.Name)"
        continue-on-error: true

      # Debug: list release directory contents
      - name: List release directory contents
        run: ls -lah release/ || true
        shell: bash
        continue-on-error: true

      # Stage artifacts for upload to workflow artifacts
      - name: Stage artifacts for upload
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p staging
          cp release/Khiops-Visualization-Desktop-* staging/ 2>/dev/null || true
          cp release/Khiops-Visualization-Desktop_* staging/ 2>/dev/null || true
          cp release/latest*.yml staging/ 2>/dev/null || true
          echo "📦 Staged artifacts:"
          ls -lah staging/
        shell: bash
        continue-on-error: true

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch || 'default' }}
          path: staging/
          if-no-files-found: warn
          retention-days: 1

  publish-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "📦 All artifacts to upload:"
          ls -lah artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create draft release and upload artifacts
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.VERSION }}"

          echo "Creating draft release $TAG..."
          gh release create "$TAG" --repo "${{ github.repository }}" --draft --generate-notes --title "$VERSION"

          echo ""
          echo "Uploading artifacts..."
          for f in artifacts/*; do
            if [ -f "$f" ]; then
              echo "⬆️ Uploading $(basename "$f") ($(du -h "$f" | cut -f1))..."
              if ! gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber; then
                echo "⚠️ Retry in 5s..."
                sleep 5
                gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber || echo "❌ Failed: $f"
              fi
            fi
          done

          echo ""
          echo "✅ Release $VERSION created successfully!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
