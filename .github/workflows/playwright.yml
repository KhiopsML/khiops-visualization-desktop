name: Playwright Tests

on:
  push:
    branches: [main, feat-multi-tabs]
  pull_request:
    branches: [main, feat-multi-tabs]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Electron binary
        id: electron-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Download Electron binary
        if: steps.electron-cache.outputs.cache-hit != 'true'
        run: node node_modules/electron/install.js
        env:
          ELECTRON_CACHE: ~/.cache/electron

      - name: Ensure Electron path.txt exists
        run: |
          ELECTRON_VERSION=$(node -p "require('./node_modules/electron/package.json').version")
          echo "Electron version: $ELECTRON_VERSION"
          ls -la node_modules/electron/
          if [ ! -f node_modules/electron/path.txt ]; then
            echo "path.txt missing — regenerating"
            node node_modules/electron/install.js
          fi
          cat node_modules/electron/path.txt
        env:
          ELECTRON_CACHE: ~/.cache/electron

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Build Electron main process
        run: yarn electron:serve-tsc

      - name: Start Angular dev server and wait
        run: |
          yarn ng:serve:dev &
          SERVER_PID=$!

          yarn wait-on http://localhost:4200 --timeout 120000 || {
            echo "wait-on failed. Checking server process..."
            kill -0 $SERVER_PID 2>/dev/null && echo "Process alive but not responding" || echo "Process is dead"
            exit 1
          }

          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

      - name: Run Playwright tests
        id: playwright-tests
        continue-on-error: true
        run: xvfb-run --auto-servernum yarn e2e

      - name: Debug - list generated files
        if: always()
        run: |
          echo "=== e2e/test-results ==="
          find e2e/test-results -type f 2>/dev/null || echo "No test-results"

          echo "=== e2e/playwright-report ==="
          find e2e/playwright-report -type f 2>/dev/null || echo "No report"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail job if tests failed
        if: steps.playwright-tests.outcome == 'failure'
        run: exit 1
